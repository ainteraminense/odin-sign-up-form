<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="logo-section">
        <div class="logo">
            <img src="./images/odin-lined.png" alt="Odin logo" width="85">
            <h1>Odin</h1>
        </div>
                    <div class="credit">Photo by Halie West on Unsplash</div>
    </div>
    <div class="form-section">
        <h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>Sign up <em>Now</em> to get started. <br><br>You <em>know</em> you want to.</h2>
        <form action="">
            <h2>Let's do this!</h2>
            <div class="form-row">
                <div class="form-col">
                    <label for="first-namme">FIRST NAME</label>
                    <input type="text" id="first-namme" name="first_name">
                </div>
                <div class="form-col">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" id="last-name" name="last_name">
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-col">
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="tel" id="phone-number" name="phone-number">
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="form-col">
                    <div class="form-col">
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm-password" name="confirm_password">
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
